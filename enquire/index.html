<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enquire | Vendaroo</title>
  <script>
    tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f0c651',
            accent: '#c94a30'
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <main class="mx-auto my-10 w-[92%] max-w-4xl">
    <a href="../index.html" class="text-sm font-bold text-accent">Back to Home</a>
    <section class="mt-4 rounded-3xl border border-black/10 bg-white p-6 md:p-10">
      <p class="kicker">Enquire</p>
      <h1 class="mt-2 text-4xl">Get Your Free Vending Machine</h1>
      <p class="mt-3 text-slate-700">Tell us about your site and we will recommend the right vending solution.</p>

      <form class="mt-8 grid gap-4 md:grid-cols-2" data-enquiry-form>
        <input type="text" placeholder="Your Name" required class="rounded-xl border border-black/15 px-4 py-3" />
        <input type="text" placeholder="Business Name" required class="rounded-xl border border-black/15 px-4 py-3" />
        <input type="email" placeholder="Email" required class="rounded-xl border border-black/15 px-4 py-3" />
        <input type="tel" placeholder="Phone" required class="rounded-xl border border-black/15 px-4 py-3" />
        <textarea placeholder="Tell us about your location and expected usage" required class="rounded-xl border border-black/15 px-4 py-3 md:col-span-2" rows="5"></textarea>
        <button type="submit" class="rounded-full bg-accent px-6 py-3 text-sm font-bold text-primary border md:col-span-2">Submit Enquiry</button>
      </form>
      <p class="mt-3 text-sm text-emerald-700" data-form-notice></p>
    </section>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
